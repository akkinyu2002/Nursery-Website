<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Lumbini Nursery</title>
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body class="admin-login-page">
    <main class="admin-login">
      <section class="admin-login__card">
        <p class="eyebrow">Nursery Admin</p>
        <h1>Order management login</h1>
        <p>Restricted dashboard access for the nursery owner and staff.</p>
        <form data-admin-login>
          <label><span>Admin email or username</span><input name="username" required placeholder="admin@example.com" /></label>
          <label><span>Password</span><input name="password" required type="password" placeholder="Enter password" /></label>
          <button type="submit">Login to Dashboard</button>
        </form>
        <p class="admin-login__note" data-login-note></p>
        <a class="admin-login__back" href="index.html">Back to website</a>
      </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/products.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-service.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/admin-login.js"></script>
  </body>
</html>
